name: Deploy Frontend

on:
  push:
    branches: [master, main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Build (static export)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.bairronow.com.br

      - name: Deploy via FTP to HostGator
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTGATOR_FTP_HOST }}
          username: ${{ secrets.HOSTGATOR_FTP_USER }}
          password: ${{ secrets.HOSTGATOR_FTP_PASSWORD }}
          local-dir: ./frontend/out/
          server-dir: /home/cleardesk/bairronow.com.br/
          protocol: ftp

      - name: Smoke test
        run: |
          sleep 5
          curl -fsSL https://bairronow.com.br/login/ -o /dev/null
          echo "Frontend smoke OK"
