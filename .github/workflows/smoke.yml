name: Production Smoke Test

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Frontend
        run: curl -fsSL -o /dev/null https://bairronow.com.br/login/
      - name: API health
        run: |
          body=$(curl -fsSL https://api.bairronow.com.br/health)
          echo "$body"
          echo "$body" | grep -q '"status":"ok"'
      - name: API swagger
        run: curl -fsSL -o /dev/null https://api.bairronow.com.br/swagger/index.html
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install newman
        run: npm install -g newman
      - name: Run newman API smoke collection
        run: newman run e2e/postman/smoke.postman_collection.json --env-var "baseUrl=https://api.bairronow.com.br"
