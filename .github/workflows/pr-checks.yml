name: PR Checks

on:
  pull_request:
    branches: [master, main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @bairronow/frontend lint || true
      - run: pnpm --filter @bairronow/frontend build
        env:
          NEXT_PUBLIC_API_URL: https://api.bairronow.com.br

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet restore src/NossoVizinho.Api/NossoVizinho.Api.csproj
      - run: dotnet build src/NossoVizinho.Api/NossoVizinho.Api.csproj -c Release --no-restore
      - run: dotnet test tests/NossoVizinho.Api.Tests/NossoVizinho.Api.Tests.csproj -c Release --no-restore
