name: E2E Playwright (Manual)

# Manual trigger only — use e2e-smoke.yml for the scheduled daily run.
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Frontend URL to test against (default: https://bairronow.com.br)'
        required: false
        default: 'https://bairronow.com.br'
      api_url:
        description: 'API URL to test against (default: https://api.bairronow.com.br)'
        required: false
        default: 'https://api.bairronow.com.br'

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      # Explicit URLs from workflow_dispatch inputs — satisfies the guard in playwright.config.ts
      PLAYWRIGHT_BASE_URL: ${{ github.event.inputs.base_url || 'https://bairronow.com.br' }}
      PLAYWRIGHT_API_URL: ${{ github.event.inputs.api_url || 'https://api.bairronow.com.br' }}
      E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm --filter @bairronow/e2e exec playwright install --with-deps chromium
      - name: Run Playwright tests
        run: pnpm --filter @bairronow/e2e test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: e2e/test-results/
          retention-days: 7
