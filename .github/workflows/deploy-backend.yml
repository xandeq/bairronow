name: Deploy Backend

on:
  push:
    branches: [master, main]
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src/NossoVizinho.Api/NossoVizinho.Api.csproj

      - name: Build
        run: dotnet build src/NossoVizinho.Api/NossoVizinho.Api.csproj -c Release --no-restore

      - name: Test
        run: dotnet test tests/NossoVizinho.Api.Tests/NossoVizinho.Api.Tests.csproj -c Release --no-restore --verbosity normal

      - name: Publish
        run: dotnet publish src/NossoVizinho.Api/NossoVizinho.Api.csproj -c Release -o publish --no-restore

      - name: Place app_offline.htm
        run: |
          python3 -c "
          import ftplib, io
          ftp = ftplib.FTP('${{ secrets.SMARTERASP_FTP_HOST }}', timeout=60)
          ftp.login('${{ secrets.SMARTERASP_FTP_USER }}', '${{ secrets.SMARTERASP_FTP_PASSWORD }}')
          ftp.set_pasv(True); ftp.cwd('/bairronow-api')
          ftp.storbinary('STOR app_offline.htm', io.BytesIO(b'<html>Updating</html>'))
          ftp.quit()
          "

      - name: FTP deploy to SmarterASP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SMARTERASP_FTP_HOST }}
          username: ${{ secrets.SMARTERASP_FTP_USER }}
          password: ${{ secrets.SMARTERASP_FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: /bairronow-api/
          protocol: ftp
          exclude: |
            **/app_offline.htm

      - name: Remove app_offline.htm
        if: always()
        run: |
          python3 -c "
          import ftplib
          ftp = ftplib.FTP('${{ secrets.SMARTERASP_FTP_HOST }}', timeout=60)
          ftp.login('${{ secrets.SMARTERASP_FTP_USER }}', '${{ secrets.SMARTERASP_FTP_PASSWORD }}')
          ftp.set_pasv(True); ftp.cwd('/bairronow-api')
          try: ftp.delete('app_offline.htm')
          except: pass
          ftp.quit()
          "

      - name: Smoke test
        run: |
          sleep 15
          curl -fsSL https://api.bairronow.com.br/health
          echo
          curl -fsSL -o /dev/null https://api.bairronow.com.br/swagger/index.html
          echo "Backend smoke OK"
